
environment:
  matrix:

   - job_name: Windows
     APPVEYOR_BUILD_WORKER_IMAGE: Visual Studio 2022
     configuration: Debug
     platform: x64

   - job_name: Windows
     APPVEYOR_BUILD_WORKER_IMAGE: Visual Studio 2022
     configuration: Release
     platform: x64

   - job_name: Windows
     APPVEYOR_BUILD_WORKER_IMAGE: Visual Studio 2022
     configuration: Retail
     platform: x64
     
   - job_name: Linux
     APPVEYOR_BUILD_WORKER_IMAGE: Ubuntu2204
     buildcfg: debug64

   - job_name: Linux
     APPVEYOR_BUILD_WORKER_IMAGE: Ubuntu2204
     buildcfg: release64

   - job_name: Linux
     APPVEYOR_BUILD_WORKER_IMAGE: Ubuntu2204
     buildcfg: retail64

   - job_name: OSX
     APPVEYOR_BUILD_WORKER_IMAGE: macOS-sonoma
     buildcfg: debug64

   - job_name: OSX
     APPVEYOR_BUILD_WORKER_IMAGE: macOS-sonoma
     buildcfg: release64

   - job_name: OSX
     APPVEYOR_BUILD_WORKER_IMAGE: macOS-sonoma
     buildcfg: retail64

shallow_clone: true

install:
- git submodule update --init --recursive

for:

# ======================================
# Windows
# ======================================

  -
    matrix:
      only:
      - job_name: Windows
      - QTDIR: C:\Qt\6.9.3\msvc2022_64

    init:
    - set QTDIR=C:\Qt\6.9.3\msvc2022_64
    - git clone --depth 1 https://github.com/rjpcomputing/luaforwindows luaforwindows
    - copy %cd%\luaforwindows\files\lua5.1.exe %cd%\luaforwindows\files\lua.exe
    - set PATH=%cd%\luaforwindows\files;C:\Qt\6.9.3\msvc2022_64\bin;%PATH%
    - git clone --depth 1 https://github.com/RudjiGames/MTuner   MTuner
    - cd MTuner && git submodule update --init --recursive

    install:
      - zidar\tools\bin\windows\genie.exe --file=src\MTuner\scripts\genie.lua vs2022

    build:
      project: MTuner\.zidar\windows\vs2022\MTuner\projects\vs2022\MTuner.sln

# ======================================
# Linux
# ======================================

  -
    matrix:
      only:
      - job_name: Linux

    init:
      - sudo apt-get update
      - sudo apt-get install -y lua5.3 lua-filesystem python3-pip libgl1-mesa-dev
      - sudo ln -sf /usr/bin/lua5.3 /usr/bin/lua
      # The Ubuntu image no longer ships Qt 6.9.2 under $HOME/Qt, so moc/uic/rcc and the Qt
      # headers were missing and every Qt project failed to build. Install the exact version we
      # build against via aqtinstall (qtbase covers Core/Gui/Widgets/Network - all we use).
      - python3 -m pip install --user -U aqtinstall
      - python3 -m aqt install-qt linux desktop 6.9.2 linux_gcc_64 -O "$HOME/Qt"
      - export QTDIR="$HOME/Qt/6.9.2/gcc_64"
      - export PATH="$HOME/Qt/6.9.2/gcc_64/bin:$HOME/Qt/6.9.2/gcc_64/libexec:$PATH"
      - export PKG_CONFIG_PATH="$PKG_CONFIG_PATH:$HOME/Qt/6.9.2/gcc_64/lib/pkgconfig"
      - export LD_LIBRARY_PATH="$HOME/Qt/6.9.2/gcc_64/lib:$HOME/Qt/6.9.2/gcc_64:$LD_LIBRARY_PATH"
      - git clone --depth 1 https://github.com/RudjiGames/MTuner   MTuner
      - git clone --depth 1 https://github.com/bkaradzic/GENie     GENie		# build GENie from source: `GLIBC_2.29' not found
      - cd GENie && make && cd ..
      - cd MTuner && git submodule update --init --recursive

    install:
      - ../GENie/bin/linux/genie --file=src/MTuner/scripts/genie.lua --gcc=linux-gcc gmake

    build_script:
      - cd .zidar/linux/linux-gcc/MTuner/projects/ && make config=${buildcfg}

# ======================================
# OSX
# ======================================

  -
    matrix:
      only:
      - job_name: OSX

    init:
      # The macOS image no longer ships Qt 6.6.1 under $HOME/Qt, so QTDIR pointed at a missing
      # tree (moc/uic/rcc + headers absent) and the build failed early. Install it via aqtinstall
      # in a venv (macOS system/Homebrew Python rejects a plain `pip install`).
      - python3 -m venv $HOME/aqtvenv
      - $HOME/aqtvenv/bin/pip install -U pip aqtinstall
      - $HOME/aqtvenv/bin/aqt install-qt mac desktop 6.6.1 clang_64 -O $HOME/Qt
      - export QTDIR="$HOME/Qt/6.6.1/macos/"
      - export PATH="$HOME/Qt/6.6.1/macos/bin:$HOME/Qt/6.6.1/macos/libexec:$PATH"
      - export PKG_CONFIG_PATH="$PKG_CONFIG_PATH:$HOME/Qt/6.6.1/macos/lib/pkgconfig"
      - curl -L -R -O https://www.lua.org/ftp/lua-5.4.7.tar.gz
      - tar zxf lua-5.4.7.tar.gz
      - cd lua-5.4.7 && sudo make all test && sudo make install && cd ..
      - git clone --depth 1 https://github.com/RudjiGames/MTuner   MTuner
      - git clone --depth 1 https://github.com/bkaradzic/GENie     GENie		# build GENie from source: `GLIBC_2.29' not found
      - cd GENie && make && cd ..
      - cd MTuner && git submodule update --init --recursive

    install:
      - ../GENie/bin/darwin/genie --file=src/MTuner/scripts/genie.lua --gcc=osx-x64 gmake
          
    build_script:
      - cd ./.zidar/osx/clang/MTuner/projects/
      - make config=${buildcfg}
      